<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arbox – שימוש ב-API לפי עסק וחודש</title>
<style>
  :root {
    --navy: #1B2A4A;
    --navy-mid: #253d6b;
    --navy-light: #d6dce8;
    --teal: #00B4D8;
    --teal-light: #e0f7fc;
    --teal-mid: #90e0ef;
    --white: #ffffff;
    --gray-bg: #f5f7fa;
    --gray-border: #dde3ed;
    --gray-text: #6b7a99;
    --text-dark: #1B2A4A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: var(--gray-bg);
    color: var(--text-dark);
    min-height: 100vh;
    direction: rtl;
  }
  header {
    background: var(--navy);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-box {
    width: 36px; height: 36px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; font-size: 16px; letter-spacing: -0.5px;
  }
  .logo-text { color: #fff; font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  header h1 {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 400;
    margin-right: auto;
  }
  .main { padding: 24px 32px; }
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1; min-width: 220px; max-width: 360px;
  }
  .search-wrap svg {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    color: var(--gray-text); pointer-events: none;
  }
  input[type="text"] {
    width: 100%;
    padding: 8px 34px 8px 12px;
    border: 1.5px solid var(--gray-border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-dark);
    background: #fff;
    outline: none;
    transition: border-color 0.15s;
    direction: rtl;
  }
  input[type="text"]:focus { border-color: var(--teal); }
  .btn-export {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-export:hover { background: #009ab8; }
  .stats {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px;
  }
  .stat {
    background: #fff;
    border: 1.5px solid var(--gray-border);
    border-radius: 10px;
    padding: 12px 20px;
    min-width: 120px;
  }
  .stat-label { font-size: 11px; color: var(--gray-text); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 700; color: var(--navy); }
  .tbl-wrap {
    overflow: auto;
    border-radius: 12px;
    border: 1.5px solid var(--gray-border);
    background: #fff;
    max-height: calc(100vh - 240px);
    box-shadow: 0 2px 12px rgba(27,42,74,0.07);
  }
  table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    font-size: 12.5px;
  }
  thead th {
    background: var(--navy);
    color: #fff;
    font-weight: 600;
    padding: 10px 12px;
    white-space: nowrap;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 2px solid var(--teal);
    user-select: none;
  }
  thead th.col-biz {
    position: sticky; right: 0; z-index: 20;
    background: var(--navy);
    min-width: 200px; max-width: 200px;
    text-align: right;
    border-left: 2px solid var(--teal);
  }
  thead th.col-pkg {
    position: sticky; right: 200px; z-index: 20;
    background: var(--navy);
    min-width: 145px; max-width: 145px;
    text-align: right;
    border-left: 2px solid rgba(0,180,216,0.35);
  }
  thead th.col-total {
    background: #0f1e35;
    min-width: 80px;
    border-right: 1.5px solid rgba(0,180,216,0.4);
  }
  thead th.col-month {
    min-width: 72px;
    text-align: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  thead th.col-month:hover { background: #253d6b; }
  thead th.sorted { background: var(--teal); color: #fff; }
  thead th.sorted.col-biz,
  thead th.sorted.col-pkg { background: var(--teal); }
  tbody tr { transition: background 0.08s; }
  tbody tr:nth-child(even) td { background: #f8fafc; }
  tbody tr:hover td { background: rgba(0,180,216,0.07) !important; }
  tbody tr:hover td.col-biz,
  tbody tr:hover td.col-pkg { background: rgba(0,180,216,0.07) !important; }
  tbody td {
    padding: 6px 12px;
    white-space: nowrap;
    border-bottom: 1px solid #edf0f7;
    color: var(--text-dark);
  }
  td.col-biz {
    position: sticky; right: 0; z-index: 5;
    background: #fff;
    font-weight: 600;
    min-width: 200px; max-width: 200px;
    overflow: hidden; text-overflow: ellipsis;
    border-left: 2px solid var(--gray-border);
    font-size: 12px;
  }
  tr:nth-child(even) td.col-biz { background: #f8fafc; }
  td.col-pkg {
    position: sticky; right: 200px; z-index: 5;
    background: #fff;
    min-width: 145px; max-width: 145px;
    overflow: hidden; text-overflow: ellipsis;
    border-left: 1px solid #edf0f7;
  }
  tr:nth-child(even) td.col-pkg { background: #f8fafc; }
  td.col-val {
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    color: var(--navy);
    font-weight: 500;
  }
  td.col-total {
    text-align: center;
    font-weight: 700;
    font-size: 12px;
    color: var(--navy);
    background: #fff !important;
    border-right: 1.5px solid var(--gray-border);
    cursor: pointer;
  }
  tr:nth-child(even) td.col-total { background: #f8fafc !important; }
  .pkg-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 5px;
    background: var(--teal-light);
    color: #006a80;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 130px;
    vertical-align: middle;
  }
  .pkg-badge.free { background: #fff8e1; color: #8a6200; }
  .pkg-badge.trial { background: #fce4ec; color: #880e4f; }
  .pkg-badge.basic { background: #f3e5f5; color: #4a148c; }
  .pkg-badge.pro { background: #e8f5e9; color: #1b5e20; }
  .pkg-badge.global { background: #e8eaf6; color: #1a237e; }
  .pkg-badge.clinic { background: #fff3e0; color: #bf360c; }
  .no-rows {
    text-align: center; padding: 3rem;
    color: var(--gray-text); font-size: 14px;
  }
  .sort-arrow { font-size: 10px; margin-right: 4px; opacity: 0.7; }
  @media print {
    header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .btn-export, .controls input { display: none; }
    .tbl-wrap { max-height: none; overflow: visible; }
    thead th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    td[style] { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>

const MONTH_LABELS=["מאי 25","יונ 25","יול 25","אוג 25","ספט 25","אוק 25","נוב 25","דצמ 25","ינו 26","פבר 26","מרצ 26","אפר 26","מאי 26"];

const pivot={};
RAW.forEach(([m,name,pkg,val])=>{
  const k=name+'|||'+pkg;
  if(!pivot[k]) pivot[k]={name,pkg,months:{},total:0};
  pivot[k].months[m]=(pivot[k].months[m]||0)+val;
  pivot[k].total+=val;
});
let rows=Object.values(pivot);
let sortCol='total', sortDir=-1;

function fmt(n){
  if(!n) return '';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(n>=10000?0:1)+'K';
  return n.toLocaleString();
}

const allVals=RAW.map(r=>r[3]);
const maxLog=Math.log(Math.max(...allVals)+1);

function heatStyle(val){
  if(!val) return '';
  const t=Math.log(val+1)/maxLog;
  if(t<0.33){
    const a=t/0.33;
    const r=Math.round(224+a*(144-224));
    const g=Math.round(247+a*(224-247));
    const b=Math.round(252+a*(239-252));
    return `background:rgb(${r},${g},${b});color:#006a80;`;
  } else if(t<0.66){
    const a=(t-0.33)/0.33;
    const r=Math.round(144+a*(0-144));
    const g=Math.round(224+a*(180-224));
    const b=Math.round(239+a*(216-239));
    return `background:rgb(${r},${g},${b});color:#004d63;`;
  } else {
    const a=(t-0.66)/0.34;
    const r=Math.round(0+a*(27-0));
    const g=Math.round(180+a*(42-180));
    const b=Math.round(216+a*(74-216));
    return `background:rgb(${r},${g},${b});color:#fff;font-weight:600;`;
  }
}

function pkgClass(pkg){
  if(/free/i.test(pkg)) return 'free';
  if(/trial/i.test(pkg)) return 'trial';
  if(/basic/i.test(pkg)) return 'basic';
  if(/professional/i.test(pkg)) return 'pro';
  if(/global/i.test(pkg)) return 'global';
  if(/clinic/i.test(pkg)) return 'clinic';
  return '';
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  let filtered=rows.filter(r=>r.name.toLowerCase().includes(q)||r.pkg.toLowerCase().includes(q));
  filtered.sort((a,b)=>{
    const av=sortCol==='total'?a.total:(a.months[sortCol]||0);
    const bv=sortCol==='total'?b.total:(b.months[sortCol]||0);
    return sortDir*(bv-av);
  });
  const tot=filtered.reduce((s,r)=>s+r.total,0);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">עסקים פעילים</div><div class="stat-val">${filtered.length}</div></div>
    <div class="stat"><div class="stat-label">סה"כ בקשות</div><div class="stat-val">${tot>=1000000?(tot/1000000).toFixed(1)+'M':tot>=1000?Math.round(tot/1000)+'K':tot.toLocaleString()}</div></div>
    <div class="stat"><div class="stat-label">חודשים</div><div class="stat-val">${MONTHS.length}</div></div>
  `;
  const arrow=d=>(d===-1?'↓':'↑');
  document.getElementById('head').innerHTML=`<tr>
    <th class="col-biz${sortCol==='name'?' sorted':''}" onclick="setSort('name')" style="cursor:pointer">עסק ${sortCol==='name'?arrow(sortDir):''}</th>
    <th class="col-pkg">חבילה</th>
    ${MONTHS.map((m,i)=>`<th class="col-month${sortCol===m?' sorted':''}" onclick="setSort('${m}')">${MONTH_LABELS[i]} ${sortCol===m?arrow(sortDir):''}</th>`).join('')}
    <th class="col-total${sortCol==='total'?' sorted':''}" onclick="setSort('total')" style="cursor:pointer">סה"כ ${sortCol==='total'?arrow(sortDir):''}</th>
  </tr>`;
  if(!filtered.length){
    document.getElementById('body').innerHTML=`<tr><td colspan="${MONTHS.length+3}" class="no-rows">לא נמצאו תוצאות</td></tr>`;
    return;
  }
  document.getElementById('body').innerHTML=filtered.map(r=>`<tr>
    <td class="col-biz" title="${r.name}">${r.name}</td>
    <td class="col-pkg"><span class="pkg-badge ${pkgClass(r.pkg)}" title="${r.pkg}">${r.pkg}</span></td>
    ${MONTHS.map(m=>{
      const v=r.months[m]||0;
      return `<td class="col-val" style="${heatStyle(v)}" title="${m}: ${v?v.toLocaleString():'-'}">${fmt(v)}</td>`;
    }).join('')}
    <td class="col-total">${fmt(r.total)}</td>
  </tr>`).join('');
}

function setSort(col){
  sortCol===col ? sortDir*=-1 : (sortCol=col, sortDir=-1);
  render();
}

function exportCSV(){
  const q=document.getElementById('search').value.toLowerCase();
  let filtered=rows.filter(r=>r.name.toLowerCase().includes(q)||r.pkg.toLowerCase().includes(q));
  filtered.sort((a,b)=>sortDir*(
    (sortCol==='total'?b.total:(b.months[sortCol]||0))-(sortCol==='total'?a.total:(a.months[sortCol]||0))
  ));
  const header=['עסק','חבילה',...MONTH_LABELS,'סה"כ'];
  const csvRows=[header.join(','),...filtered.map(r=>[
    `"${r.name}"`,`"${r.pkg}"`,
    ...MONTHS.map(m=>r.months[m]||0),
    r.total
  ].join(','))];
  const blob=new Blob(['\uFEFF'+csvRows.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='arbox_api_usage.csv';
  a.click();
}

render();
